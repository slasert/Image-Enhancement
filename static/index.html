<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Enhancement</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><rect x='18' y='28' width='64' height='44' rx='8' fill='none' stroke='white' stroke-width='6'/><circle cx='50' cy='50' r='13' fill='none' stroke='white' stroke-width='5'/><circle cx='73' cy='32' r='5' fill='white'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #f0f4ff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 { font-size: 1.75rem; margin-bottom: 6px; color: #1e293b; font-weight: 700; }
    p.sub { color: #94a3b8; margin-bottom: 32px; font-size: 0.88rem; }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 24px;
      box-shadow: 0 2px 20px rgba(99,102,241,0.07);
    }

    .upload-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 540px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 38px 32px;
      z-index: 10;
      box-shadow: 0 8px 40px rgba(99,102,241,0.10);
      transition: opacity 0.3s, transform 0.3s;
    }
    .upload-card.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -48%) scale(0.97);
    }
    .upload-card h1 { text-align: center; margin-bottom: 6px; }
    .upload-card p.sub { text-align: center; }

    .upload-area {
      border: 2px dashed #c7d2fe;
      border-radius: 12px;
      padding: 52px 40px;
      text-align: center;
      cursor: pointer;
      background: #f8f9ff;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #6366f1;
      background: #f0f0ff;
    }
    .upload-area span { color: #94a3b8; font-size: 0.95rem; }
    .upload-area strong { color: #6366f1; }

    input[type="file"] { display: none; }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .preview-box {
      display: none;
      margin-top: 16px;
      border-radius: 10px;
      overflow: hidden;
      background: #f8f9ff;
      border: 1px solid #e2e8f0;
    }
    .preview-box img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      display: block;
    }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      flex: 1;
      min-width: 140px;
      box-shadow: 0 4px 14px rgba(99,102,241,0.25);
    }
    button:hover:not(:disabled) {
      background: #4f46e5;
      box-shadow: 0 4px 18px rgba(99,102,241,0.35);
    }
    button:disabled { opacity: 0.40; cursor: not-allowed; box-shadow: none; }

    button.btn-gray {
      background: #f1f5f9;
      color: #475569;
      box-shadow: none;
      border: 1px solid #e2e8f0;
    }
    button.btn-gray:hover:not(:disabled) {
      background: #e2e8f0;
      box-shadow: none;
    }

    .results { display: none; }

    .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .img-box {
      background: #f8f9ff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .img-box .label {
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #94a3b8;
      border-bottom: 1px solid #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }
    .img-box img {
      width: 100%;
      display: block;
      max-height: 340px;
      object-fit: contain;
      background: #f0f4ff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .metric-card {
      background: #f8f9ff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .metric-card .val {
      font-size: 1rem;
      font-weight: 700;
      color: #6366f1;
      white-space: nowrap;
    }
    .metric-card .name {
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #ef4444;
      font-size: 0.88rem;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 540px) {
      .image-row { grid-template-columns: 1fr; }
    }

    /* Chat — floating FAB + popup panel */
    .chat-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #6366f1;
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(99,102,241,0.40);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .chat-fab:hover {
      background: #4f46e5;
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 10px 28px rgba(99,102,241,0.50);
    }
    .chat-fab svg { width: 28px; height: 28px; }
    .chat-fab .icon-close { display: none; }
    .chat-fab.open .icon-bubble { display: none; }
    .chat-fab.open .icon-close  { display: block; }

    .chat-panel {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 380px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 130px);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(99,102,241,0.20);
      z-index: 99;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-panel.open {
      display: flex;
      animation: chatIn 0.18s ease;
    }
    @keyframes chatIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8f9ff;
    }
    .chat-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1e293b;
      flex: 1;
    }
    .chat-header .badge {
      font-size: 0.65rem;
      color: #6366f1;
      background: #eef2ff;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .chat-body {
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .chat-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }

    .chat-log {
      background: #f8f9ff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      flex: 1;
      min-height: 180px;
      max-height: 340px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-log:empty::before {
      content: 'Ask a question — about modes, metrics, or techniques.';
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      padding: 18px 8px;
    }

    .chat-msg {
      max-width: 88%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #1e293b;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.assistant.streaming::after {
      content: '▍';
      color: #6366f1;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input-row input {
      flex: 1;
      padding: 10px 13px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fff;
      color: #1e293b;
      outline: none;
      min-width: 0;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .chat-input-row input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .chat-input-row button {
      flex: 0 0 auto;
      min-width: 78px;
      padding: 10px 16px;
      font-size: 0.88rem;
    }

    @media (max-width: 540px) {
      .chat-panel {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 92px;
      }
      .chat-fab {
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Sayfa ortasında upload kartı -->
  <div class="upload-card" id="uploadCard">
    <h1>Face Enhancement</h1>
    <p class="sub">LAB · CLAHE · Bilateral · SSIM / PSNR</p>

    <div class="upload-area" id="uploadArea" style="margin-top:24px">
      <input type="file" id="fileInput" accept="image/*" />
      <span>Drag your image here or <strong>click to upload</strong></span>
    </div>

    <div class="preview-box" id="previewBox">
      <img id="previewImg" alt="preview" />
    </div>

    <div class="controls">
      <button id="enhanceBtn" disabled>Enhance</button>
    </div>

    <div class="spinner" id="spinner"></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card results" id="results" style="margin-top:24px">
    <div class="image-row">
      <div class="img-box">
        <div class="label">Original</div>
        <img id="origImg" src="" alt="original" />
      </div>
      <div class="img-box">
        <div class="label">Enhanced</div>
        <img id="enhImg" src="" alt="enhanced" />
      </div>
    </div>

    <div class="metrics" id="metricsRow"></div>

    <div style="margin-top:20px; text-align:center;">
      <button id="newImageBtn" class="btn-gray" style="max-width:260px; flex:none;">
        ↑ Upload a new image
      </button>
    </div>
  </div>

  <div class="chat-panel" id="chatPanel" role="dialog" aria-label="Image Enhancement Assistant">
    <div class="chat-header">
      <h2>Image Enhancement Assistant</h2>
      <span class="badge">AI</span>
    </div>

    <div class="chat-body">
      <div class="chat-suggestions" id="chatSuggestions">
        <button class="chip" data-prompt="What do these metrics mean?">Interpret metrics</button>
        <button class="chip" data-prompt="Which mode is best for my image?">Which mode?</button>
        <button class="chip" data-prompt="How does CLAHE work?">What is CLAHE?</button>
        <button class="chip" data-prompt="Why is LAB color space used?">Why LAB?</button>
      </div>

      <div class="chat-log" id="chatLog"></div>

      <form class="chat-input-row" id="chatForm" autocomplete="off">
        <input id="chatInput" type="text" placeholder="Type your question..." />
        <button type="submit" id="chatSend">Send</button>
      </form>
    </div>
  </div>

  <button class="chat-fab" id="chatFab" type="button" aria-label="Open Image Enhancement Assistant">
    <svg class="icon-bubble" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <script>
    // If opened as a local file (double-click), redirect to the server
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost:8000');
    }

    const uploadCard  = document.getElementById('uploadCard');
    const uploadArea  = document.getElementById('uploadArea');
    const fileInput   = document.getElementById('fileInput');
    const enhanceBtn  = document.getElementById('enhanceBtn');
    const newImageBtn = document.getElementById('newImageBtn');
    const previewBox  = document.getElementById('previewBox');
    const previewImg  = document.getElementById('previewImg');
    const spinner     = document.getElementById('spinner');
    const errorMsg    = document.getElementById('errorMsg');
    const results     = document.getElementById('results');
    const origImg     = document.getElementById('origImg');
    const enhImg      = document.getElementById('enhImg');
    const metricsRow  = document.getElementById('metricsRow');

    let selectedFile = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(f) {
      selectedFile = f;
      uploadArea.querySelector('span').innerHTML = `<strong>${f.name}</strong> selected`;
      enhanceBtn.disabled = false;

      const url = URL.createObjectURL(f);
      origImg.src  = url;
      previewImg.src = url;
      previewBox.style.display = 'block';

      results.style.display = 'none';
      enhImg.src = '';
      metricsRow.innerHTML = '';
    }

    // Client-side resize: mobile cihazlarda 4-8 MB fotograflar upload sirasinda
    // takiliyordu. Canvas uzerinden gecirmek HEIC -> JPEG donusumu de yapar.
    async function downscaleFile(file, maxDim = 1600) {
      const objUrl = URL.createObjectURL(file);
      try {
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload  = () => resolve(i);
          i.onerror = () => reject(new Error('Goruntu yuklenemedi (format desteklenmiyor olabilir).'));
          i.src = objUrl;
        });

        const longest = Math.max(img.naturalWidth, img.naturalHeight);
        const scale   = longest > maxDim ? maxDim / longest : 1;
        const w = Math.round(img.naturalWidth  * scale);
        const h = Math.round(img.naturalHeight * scale);

        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        const blob = await new Promise((resolve, reject) =>
          canvas.toBlob(b => b ? resolve(b) : reject(new Error('JPEG olusturulamadi.')),
                        'image/jpeg', 0.92)
        );
        return new File([blob], (file.name || 'image').replace(/\.[^.]+$/, '') + '.jpg',
                        { type: 'image/jpeg' });
      } finally {
        URL.revokeObjectURL(objUrl);
      }
    }

    let lastEnhancedUrl = null;
    enhanceBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      errorMsg.style.display = 'none';
      spinner.style.display  = 'block';
      enhanceBtn.disabled    = true;

      let uploadFile;
      try {
        uploadFile = await downscaleFile(selectedFile, 1600);
      } catch (e) {
        console.error('Downscale failed:', e);
        errorMsg.textContent   = e.message || 'Goruntu hazirlanamadi.';
        errorMsg.style.display = 'block';
        spinner.style.display  = 'none';
        enhanceBtn.disabled    = false;
        return;
      }

      const form = new FormData();
      form.append('file', uploadFile);
      try {
        const res = await fetch('/enhance/metrics?mode=combined', {
          method: 'POST',
          body: form,
        });

        if (!res.ok) {
          let detail = `HTTP ${res.status}`;
          try {
            const err = await res.json();
            detail = typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail);
          } catch (_) {}
          throw new Error(detail);
        }

        const data = await res.json();

        // base64 -> Blob -> blob URL (Safari data: URL boyut limitine takilmaz)
        const bin = atob(data.enhanced_image);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'image/jpeg' });
        if (lastEnhancedUrl) URL.revokeObjectURL(lastEnhancedUrl);
        lastEnhancedUrl = URL.createObjectURL(blob);
        enhImg.src = lastEnhancedUrl;

        const m = data.metrics;
        metricsRow.innerHTML = `
          ${metricCard(m.psnr_db + ' dB', 'PSNR')}
          ${metricCard(m.ssim, 'SSIM')}
          ${metricCard(m.psnr_per_channel.B + ' dB', 'PSNR · B')}
          ${metricCard(m.psnr_per_channel.G + ' dB', 'PSNR · G')}
          ${metricCard(m.psnr_per_channel.R + ' dB', 'PSNR · R')}
        `;

        uploadCard.classList.add('hidden');
        results.style.display = 'block';
        updateChatContext({ mode: 'combined', metrics: m });
      } catch (e) {
        console.error('Enhance failed:', e);
        errorMsg.textContent   = e.message || String(e);
        errorMsg.style.display = 'block';
      } finally {
        spinner.style.display = 'none';
        enhanceBtn.disabled   = false;
      }
    });

    function metricCard(val, name) {
      return `<div class="metric-card"><div class="val">${val}</div><div class="name">${name}</div></div>`;
    }

    newImageBtn.addEventListener('click', () => {
      results.style.display = 'none';
      uploadCard.classList.remove('hidden');
      previewBox.style.display = 'none';
      uploadArea.querySelector('span').innerHTML = `Drag your image here or <strong>click to upload</strong>`;
      enhanceBtn.disabled = true;
      fileInput.value = '';
      selectedFile = null;
      origImg.src = '';
      enhImg.src = '';
      metricsRow.innerHTML = '';
      errorMsg.style.display = 'none';
      resetChat();
    });

    // ---- Chat (Image Enhancement Assistant) -------------------------------
    const chatFab    = document.getElementById('chatFab');
    const chatPanel  = document.getElementById('chatPanel');
    const chatLog    = document.getElementById('chatLog');
    const chatForm   = document.getElementById('chatForm');
    const chatInput  = document.getElementById('chatInput');
    const chatSend   = document.getElementById('chatSend');
    const chatChips  = document.getElementById('chatSuggestions');

    let chatHistory = [];     // [{role, content}]
    let chatContext = null;   // string: mode + metrics summary
    let chatBusy    = false;

    function updateChatContext({ mode, metrics }) {
      const parts = [`Mode used: ${mode}`];
      if (metrics) {
        const psnr = metrics.psnr_db;
        const ssim = metrics.ssim;
        if (psnr != null) parts.push(`PSNR: ${psnr} dB`);
        if (ssim != null) parts.push(`SSIM: ${ssim}`);
        if (metrics.psnr_per_channel) {
          const p = metrics.psnr_per_channel;
          parts.push(`PSNR per channel: B=${p.B} G=${p.G} R=${p.R} dB`);
        }
      }
      chatContext = parts.join(' | ');
    }

    function toggleChat(forceOpen) {
      const willOpen = forceOpen !== undefined
        ? forceOpen
        : !chatPanel.classList.contains('open');
      chatPanel.classList.toggle('open', willOpen);
      chatFab.classList.toggle('open', willOpen);
      chatFab.setAttribute(
        'aria-label',
        willOpen ? 'Close Image Enhancement Assistant' : 'Open Image Enhancement Assistant'
      );
      if (willOpen) setTimeout(() => chatInput.focus(), 50);
    }

    function resetChat() {
      chatHistory = [];
      chatContext = null;
      chatLog.innerHTML = '';
      toggleChat(false);
    }

    function appendMsg(role, text) {
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      return div;
    }

    async function sendChat(prompt) {
      if (chatBusy || !prompt.trim()) return;
      chatBusy = true;
      chatSend.disabled = true;
      chatInput.disabled = true;

      const userText = prompt.trim();
      chatHistory.push({ role: 'user', content: userText });
      appendMsg('user', userText);

      const assistantNode = appendMsg('assistant', '');
      assistantNode.classList.add('streaming');

      let assistantText = '';
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: chatHistory,
            context: chatContext,
          }),
        });

        if (!res.ok || !res.body) {
          throw new Error(`HTTP ${res.status}`);
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          assistantText += chunk;
          assistantNode.textContent = assistantText;
          chatLog.scrollTop = chatLog.scrollHeight;
        }
        const tail = decoder.decode();
        if (tail) {
          assistantText += tail;
          assistantNode.textContent = assistantText;
        }

        if (assistantText.trim()) {
          chatHistory.push({ role: 'assistant', content: assistantText });
        } else {
          assistantNode.textContent = '[empty response]';
        }
      } catch (e) {
        console.error('Chat error:', e);
        assistantNode.textContent = `[Error] ${e.message || e}`;
      } finally {
        assistantNode.classList.remove('streaming');
        chatBusy = false;
        chatSend.disabled = false;
        chatInput.disabled = false;
        chatInput.focus();
      }
    }

    chatFab.addEventListener('click', () => toggleChat());

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && chatPanel.classList.contains('open')) {
        toggleChat(false);
      }
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value;
      chatInput.value = '';
      sendChat(text);
    });

    chatChips.addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      sendChat(btn.dataset.prompt);
    });
  </script>
</body>
</html>
